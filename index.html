<script>
  // Device ID Management
  let deviceId = localStorage.getItem("falcon_pro_id");
  if (!deviceId) {
    deviceId = "X-" + Math.floor(1000 + Math.random() * 9000); 
    localStorage.setItem("falcon_pro_id", deviceId);
  }
  document.getElementById("myDevId").innerText = deviceId;

  // Authentication
  const secret = "443366"; 
  function attemptLogin() {
    let val = document.getElementById("passInput").value;
    if(val === secret) {
      document.getElementById("loginPart").style.display = "none";
      document.getElementById("signalPart").style.display = "block";
      startSignalEngine();
    } else {
      let err = document.getElementById("wrong");
      err.style.display = "block";
      setTimeout(() => err.style.display = "none", 2000);
    }
  }

  // Draggable Feature
  const tool = document.getElementById("signalBox");
  let drag = false, xOff, yOff;

  const activeUI = (e) => ['INPUT', 'BUTTON', 'A'].includes(e.target.tagName);

  tool.addEventListener('mousedown', startDrag);
  tool.addEventListener('touchstart', (e) => startDrag(e.touches[0]), {passive: false});

  function startDrag(e) {
    if(activeUI(e)) return;
    drag = true;
    xOff = e.clientX - tool.getBoundingClientRect().left;
    yOff = e.clientY - tool.getBoundingClientRect().top;
  }

  document.addEventListener('mousemove', (e) => move(e));
  document.addEventListener('touchmove', (e) => move(e.touches[0]), {passive: false});

  function move(e) {
    if(!drag) return;
    let nx = e.clientX - xOff;
    let ny = e.clientY - yOff;
    tool.style.left = Math.max(0, Math.min(window.innerWidth - 180, nx)) + 'px';
    tool.style.top = Math.max(0, Math.min(window.innerHeight - 250, ny)) + 'px';
  }

  document.addEventListener('mouseup', () => drag = false);
  document.addEventListener('touchend', () => drag = false);

  // Prediction Engine - Only BIG and SMALL predictions
  let lastInt = -1;
  let countdownTimer = 30;
  
  function startSignalEngine() { 
    update(); 
    runAI(); // Initial prediction
  }

  function update() {
    let d = new Date();
    let ms = d.getTime();
    let currentId = Math.floor(ms / 30000);
    
    // Update countdown every second
    countdownTimer = 30 - Math.floor((ms % 30000) / 1000);
    document.getElementById("countdown").innerText = countdownTimer;
    
    // Update prediction every 30 seconds
    if(currentId !== lastInt) {
      lastInt = currentId;
      runAI();
    }
    
    document.getElementById("currentTime").innerText = d.toLocaleTimeString();
    requestAnimationFrame(update);
  }

  function runAI() {
    // Show loading animation
    const loadingOverlay = document.getElementById("loadingOverlay");
    loadingOverlay.classList.add('active');
    
    // Simulate processing time
    setTimeout(() => {
      // Generate only BIG or SMALL prediction
      const predictions = [
        { text: "BIG", color: "#00e676" },      // Big in green
        { text: "SMALL", color: "#ff1744" }     // Small in red
      ];
      
      let res = predictions[Math.floor(Math.random() * predictions.length)];
      
      let el = document.getElementById("predicted");
      
      // Hide loading animation
      loadingOverlay.classList.remove('active');
      
      // Apply animation effect
      el.style.transform = "scale(0.8)";
      el.style.opacity = "0";
      
      setTimeout(() => {
        el.innerText = res.text;
        el.style.color = res.color;
        el.style.transform = "scale(1)";
        el.style.opacity = "1";
      }, 400);
    }, 1000); // 1 second loading animation
  }
</script>
